name: Workflow Filters and Activities

on:
  workflow_dispatch:

  # schedule:
  #   - cron: "*/59 * * * *"

  push:
    branches:
      - main
      # - '!feature/*'  # Not needed here because only main is allowed anyway

  pull_request:
    types:
      - opened
      - closed
    paths-ignore:
      - README.md
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print event name
        run: echo "This workflow/job/step is executed for event type - ${{ github.event_name }}"